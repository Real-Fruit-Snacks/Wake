# Creates a GitHub release whenever a version tag is pushed (e.g. `git tag 0.6.1 && git push --tags`).
# Attaches manifest.json, main.js, styles.css individually (so Obsidian / BRAT can fetch them),
# plus a wake-<version>.zip containing the same three files inside a `wake/` folder so users can
# extract it directly into <vault>/.obsidian/plugins/.
# The tag name must match manifest.json's "version" field.

name: Release

on:
  push:
    tags:
      - "[0-9]+.[0-9]+.[0-9]+"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Verify tag matches manifest version
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          MANIFEST_VERSION=$(node -e "console.log(require('./manifest.json').version)")
          if [ "$TAG" != "$MANIFEST_VERSION" ]; then
            echo "Tag '$TAG' does not match manifest.json version '$MANIFEST_VERSION'."
            exit 1
          fi
          echo "Tag and manifest version match: $TAG"

      - name: Build install zip
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          mkdir -p wake
          cp manifest.json main.js styles.css wake/
          zip -r "wake-${TAG}.zip" wake
          ls -la "wake-${TAG}.zip"

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          gh release create "$TAG" \
            --title "Wake $TAG" \
            --notes-file CHANGELOG.md \
            --verify-tag \
            manifest.json main.js styles.css "wake-${TAG}.zip"
